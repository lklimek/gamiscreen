---
name: Claudius Review & Learn

"on":
  pull_request:
    types: [opened, synchronize, ready_for_review, closed]

jobs:
  review:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.merged != true &&
      github.event.action != 'closed'
    concurrency:
      group: claudius-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    env:
      ANTHROPIC_MODEL: ${{ vars.CLAUDE_MODEL }}
    steps:
      - uses: lklimek/claudius-review-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          memcan_url: ${{ secrets.MEMCAN_URL }}
          memcan_api_key: ${{ secrets.MEMCAN_API_KEY }}
          prompt_extra: >
            Rust + TypeScript (Tauri/Leptos) project with Android builds
            and a game server. Focus on: memory safety, async correctness,
            proper error handling, UI accessibility.

  learn:
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    env:
      ANTHROPIC_MODEL: sonnet
    steps:
      - uses: lklimek/claudius-review-action/learn@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          memcan_url: ${{ secrets.MEMCAN_URL }}
          memcan_api_key: ${{ secrets.MEMCAN_API_KEY }}
